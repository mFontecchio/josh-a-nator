<main class="page">
  <h1 class="brand">Josh-a-nator</h1>
  <p class="tagline">Press the button. Hear what Josh has to say.</p>

  <div class="stage">
    <div
      class="bubble"
      [class.bubble--pop]="bubbleAnimating()"
      role="status"
      aria-live="polite"
    >
      <p class="bubble__text">{{ phrase() }}</p>
    </div>

    <img
      class="portrait"
      src="/images/IMG_20260514_062431.png"
      width="480"
      height="640"
      alt="Josh pointing upward while speaking"
    />
  </div>

  <button type="button" class="speak-btn" (click)="saySomething()">
    Say something
  </button>
</main>
