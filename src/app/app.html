<main class="page">
  <h1 class="brand">Josh-a-nator</h1>
  <p class="tagline">Press the button. Hear what Josh has to say.</p>

  <div class="stage">
    <div
      class="bubble"
      [class.bubble--pop]="bubbleAnimating()"
      role="status"
      aria-live="polite"
    >
      <div class="bubble__body">
        <p
          class="bubble__text"
          [class.bubble__text--scrambling]="isScrambling()"
        >
          {{ displayText() }}
        </p>
      </div>
    </div>

    <img
      class="portrait"
      src="images/josh-clay-illustration.png"
      width="480"
      height="640"
      alt="Clay illustration of Josh pointing upward while speaking"
    />
  </div>

  <button
    type="button"
    class="speak-btn"
    [disabled]="isScrambling()"
    (click)="saySomething()"
  >
    Say something
  </button>
</main>
