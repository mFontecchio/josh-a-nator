<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160" preserveAspectRatio="none">
  <defs>
    <linearGradient id="clay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4e8d8" />
      <stop offset="0.46" stop-color="#e8d5bc" />
      <stop offset="0.78" stop-color="#d9bea0" />
      <stop offset="1" stop-color="#c7a680" />
    </linearGradient>
    <radialGradient id="highlight" cx="0.18" cy="0.1" r="0.68">
      <stop offset="0" stop-color="#fff9ef" stop-opacity="0.62" />
      <stop offset="0.62" stop-color="#fff9ef" stop-opacity="0.08" />
      <stop offset="1" stop-color="#fff9ef" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="shade" cx="0.84" cy="0.92" r="0.72">
      <stop offset="0" stop-color="#765033" stop-opacity="0.26" />
      <stop offset="0.7" stop-color="#765033" stop-opacity="0.05" />
      <stop offset="1" stop-color="#765033" stop-opacity="0" />
    </radialGradient>
    <filter id="handmade" x="-4%" y="-5%" width="108%" height="112%" color-interpolation-filters="sRGB">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.018 0.045"
        numOctaves="2"
        seed="17"
        result="shapeNoise"
      />
      <feDisplacementMap
        in="SourceGraphic"
        in2="shapeNoise"
        scale="1.35"
        xChannelSelector="R"
        yChannelSelector="G"
        result="modeledShape"
      />
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.16"
        numOctaves="3"
        seed="9"
        result="surfaceNoise"
