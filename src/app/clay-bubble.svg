                0 0 0.18 0 0.30
                0 0 0 0.1 0"
        result="warmGrain"
      />
      <feComposite in="warmGrain" in2="SourceAlpha" operator="in" result="clippedGrain" />
      <feBlend in="modeledShape" in2="clippedGrain" mode="soft-light" />
    </filter>
  </defs>
  <g filter="url(#handmade)">
    <path
